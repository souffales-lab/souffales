<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission & Merch Store</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- TEMA WARNA COKLAT MUDA & MINIMALIS --- */
        :root {
            --bg-body: #fffcf4;       
            --bg-card: #ffecb4;       
            --primary: #f5dca4;       
            --primary-hover: #A07855; 
            --text-dark: #502e2d;     
            --text-light: #8D6E63;    
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            padding-bottom: 100px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary-hover); margin-bottom: 5px; }
        .header p { color: var(--text-light); font-size: 0.9em; }

        .card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        /* --- FORM INFO --- */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-group-full { margin-bottom: 0; }
        .form-group label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 8px; color: var(--primary-hover); }
        
        /* Modifikasi input dan select agar tampilannya kembar identik */
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid transparent; 
            border-radius: 10px; 
            background: var(--white); 
            color: var(--text-dark); 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            font-size: 14px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        
        /* Mempercantik tampilan dropdown select bawaan browser */
        .form-group select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            /* Tambahan icon panah minimalis modern di kanan */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%238D6E63' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        /* Merapikan warna teks pilihan utama (placeholder) */
        .form-group select:invalid,
        .form-group select option[value=""] {
            color: #a0a0a0;
        }

        /* --- KATEGORI & PRODUK --- */
        .category-title { font-size: 1.2em; font-weight: bold; color: var(--primary-hover); margin-top: 30px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px dashed var(--primary); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .product-item { background: var(--white); border: 3px solid transparent; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.3s ease; user-select: none; }
        .product-item:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(160, 120, 85, 0.1); }
        .product-item.selected { border-color: var(--primary-hover); background-color: #F9F1E7; }
        .product-img { width: 100%; aspect-ratio: 1; background-color: var(--bg-card); border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-light); overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-name { font-size: 0.85em; font-weight: bold; }
        .
