<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souffales - Links & Order</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-body: #fffcf4;       
            --bg-card: #ffecb4;       
            --primary: #f5dca4;       
            --primary-hover: #A07855; 
            --text-dark: #502e2d;     
            --text-light: #8D6E63;    
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- NAVIGATION SYSTEM --- */
        .page { display: none; }
        .page.active { display: block; }

        /* --- LANDING PAGE STYLES --- */
        .profile-area { text-align: center; margin-bottom: 40px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--bg-card); border: 4px solid var(--white); margin-bottom: 15px; }
        
        .nav-button {
            display: block;
            width: 100%;
            background: var(--bg-card);
            color: var(--text-dark);
            text-decoration: none;
            text-align: center;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid transparent;
            cursor: pointer;
            box-sizing: border-box;
        }
        .nav-button:hover {
            background: var(--primary);
            transform: translateY(-3px);
            border-color: var(--white);
        }

        /* --- FORM STYLES --- */
        .card { background: var(--bg-card); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .category-title { font-size: 1.4em; font-weight: bold; color: var(--primary-hover); margin-top: 20px; margin-bottom: 15px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 8px; color: var(--primary-hover); }
        .form-group input { width: 100%; padding: 12px; border-radius: 10px; border: none; outline: none; box-sizing: border-box; }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-item { background: var(--white); border-radius: 15px; padding: 15px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .product-item.selected { border-color: var(--primary-hover); background: #F9F1E7; }
        .product-name { font-weight: bold; font-size: 1em; margin-bottom: 5px; }
        .product-price { color: var(--primary-hover); font-weight: bold; font-size: 0.9em; margin-bottom: 8px; }
        .product-desc { font-size: 0.75em; color: var(--text-light); line-height: 1.3; }

        /* --- COMING SOON AREA --- */
        .coming-soon { text-align: center; padding: 50px 20px; }
        .back-link { display: inline-block; margin-top: 20px; color: var(--primary-hover); font-weight: bold; cursor: pointer; }

        /* --- FLOATING BAR --- */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); z-index: 50; }
        .btn-checkout { background: var(--primary-hover); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-checkout:disabled { background: #d3c3b4; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: var(--bg-body); border-radius: 20px; width: 90%; max-width: 450px; padding: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        .receipt-container { padding: 20px; background: var(--bg-body); }
        .r-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9em; }
        .r-total-box { background: var(--primary-hover); color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">

    <div id="pageLanding" class="page active">
        <div class="profile-area">
            <div class="avatar" style="margin: 0 auto 15px;">
                <img src="https://via.placeholder.com/100" style="border-radius: 50%; width: 100%;">
            </div>
            <h2 style="color: var(--primary-hover);">Souffales ✨</h2>
            <p style="color: var(--text-light); font-size: 0.9em;">Stickers, Merch & Illustration</p>
        </div>

        <a href="https://shopee.co.id/souffales" target="_blank" class="nav-button">🛒 Shopee Store</a>
        <div onclick="showPage('pagePreOrder')" class="nav-button">📦 Pre-Order Merch</div>
        <div onclick="showPage('pageCommission')" class="nav-button">🎨
